name: Format Code
on:
    push:
        branches:
            - master
jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: '14'
            - name: Install dependencies
              run: npm ci
            - name: Run code formatting
              run: npm run format
            - name: Configure Git
              run: |
                  git config --global user.name "ihtesham510"
                  git config --global user.email "ihteshamulhaq510@gmail.com"
            - name: Commit changes
              run: |
                  git add .
                  git commit -m "Auto-format code"
            - name: Push changes
              env:
                  GH_TOKEN: ${{ secrets.TOKEN }}
              run: |
                  git push origin master
