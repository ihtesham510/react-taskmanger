name: Prettier

on:
  push:
    branches:
      - master

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run Prettier
        run: npx prettier . --write

      - name: Configure Git
        run: |
          git config --global user.name "prettier action"
          git config --global user.email "ihteshamulhaq510@gmail.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Apply Prettier formatting [skip ci]"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.TOKEN }}
          script: |
            git push -u origin master

